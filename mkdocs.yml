site_name: 微电子自学指南
site_url: https://wdzdiy.wiki
site_description: 一份面向微电子 / 集成电路方向同学的自学指南
site_author: sjy0630
copyright: Copyright &copy; 2025 微电子自学指南 - 内容采用 CC BY-NC-SA 4.0 协议

repo_url: https://github.com/sjy0630/wdzdiy
repo_name: sjy0630/wdzdiy
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  custom_dir: overrides
  features:
    - navigation.tabs           # 顶部一级 tab
    - navigation.tabs.sticky    # tab 跟随滚动
    - navigation.sections       # 侧栏分组
    - navigation.indexes        # 允许章节首页
    - navigation.tracking       # URL 跟随章节
    - navigation.top            # 返回顶部
    - navigation.footer         # 上一页/下一页
    - toc.follow                # 目录高亮跟随
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy         # 代码一键复制
    - content.code.annotate     # 代码注解
    - content.action.edit       # 一键到 GitHub 编辑
    - content.action.view       # 一键查看源文件
    - content.tabs.link         # tab 联动切换
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  analytics:
    provider: custom   # 实际脚本在 overrides/partials/integrations/analytics/custom.html
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sjy0630/wdzdiy
      name: GitHub 仓库
    - icon: fontawesome/solid/envelope
      link: mailto:jiangyusu25@m.fudan.edu.cn
      name: 邮件联系

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai
      locale: zh
      enable_creation_date: true
      fallback_to_build_date: true

nav:
  - 首页: index.md
  - 数学基础:
    - math/index.md
    - 微积分: math/calculus.md
    - 线性代数: math/linear_algebra.md
    - 概率论与数理统计: math/probability.md
    - 复变函数: math/complex_analysis.md
  - 物理基础:
    - physics/index.md
    - 大学物理: physics/general_physics.md
    - 电磁学: physics/electromagnetism.md
    - 量子力学: physics/quantum_mechanics.md
  - 电路与信号:
    - circuit/index.md
    - 电路分析: circuit/circuit_analysis.md
    - 模拟电子技术: circuit/analog_electronics.md
    - 数字电子技术: circuit/digital_electronics.md
    - 信号与系统: circuit/signals_systems.md
  - 半导体与器件:
    - semiconductor/index.md
    - 半导体物理: semiconductor/semi_physics.md
    - 半导体器件: semiconductor/semi_devices.md
    - 集成电路工艺: semiconductor/ic_process.md
  - 数字 IC:
    - digital_ic/index.md
    - Verilog / SystemVerilog: digital_ic/verilog.md
    - 计算机组成原理: digital_ic/computer_organization.md
    - 数字 IC 设计流程: digital_ic/design_flow.md
    - 验证 (UVM): digital_ic/verification.md
    - FPGA 与 Vivado: digital_ic/fpga.md
  - 模拟 IC:
    - analog_ic/index.md
    - 模拟集成电路设计: analog_ic/analog_ic_design.md
    - Cadence Virtuoso 入门: analog_ic/cadence.md
  - 编程入门:
    - cs/index.md
    - C / C++: cs/c_cpp.md
    - Python: cs/python.md
  - 工具与环境:
    - tools/index.md
    - Linux: tools/linux.md
    - Git: tools/git.md
    - Vim: tools/vim.md
    - LaTeX: tools/latex.md
    - Tcl / Make 脚本: tools/scripting.md
  - 科研与求职:
    - career/index.md
    - 论文检索: career/literature.md
    - 英语: career/english.md
    - 实习与保研: career/intern.md
  - 关于:
    - 贡献指南: about/contributing.md
    - 友情链接: about/links.md
